services:

  bookstack:
    image: linuxserver/bookstack:version-v26.05
    container_name: bookstack
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Brussels
      - APP_URL=https://wiki.home.io
      # docker run -it --rm --entrypoint /bin/bash lscr.io/linuxserver/bookstack:latest appkey
      - APP_KEY=base64:SkYLKdba38lfo5nfkp0yruqXx4s9Wb3nVSERqZbAS9o=

      - DB_HOST=mariadb
      - DB_PORT=3306
      - DB_DATABASE=bookstack
      - DB_USERNAME=bookstack
      - DB_PASSWORD=bookstack8432
    volumes:
      - data:/config
    ports:
      - 6875:80
    restart: unless-stopped


  mariadb:
    image: mariadb:12.3.2
    container_name: bookstack_mariadb
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Brussels
      - MYSQL_ROOT_PASSWORD=mysupersecretrootpassword
      - MYSQL_DATABASE=bookstack
      - MYSQL_USER=bookstack
      - MYSQL_PASSWORD=bookstack8432
    volumes:
      - db_data:/config

    restart: unless-stopped

volumes:
    data:
    db_data: