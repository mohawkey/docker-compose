# --------------------------------------------------------------------------------
# https://hub.docker.com/_/mysql/
# --------------------------------------------------------------------------------

services:
  mysql:
    image: mysql:8.4
    container_name: mysql
    restart: unless-stopped
    network_mode: bridge
    environment:
      MYSQL_ROOT_PASSWORD: '${MYSQL_ROOTPASS}'
      MYSQL_DATABASE: '${MYSQL_DB}'
      MYSQL_USER: '${MYSQL_USER}'
      MYSQL_PASSWORD: '${MYSQL_PASS}'
    ports:
      - 3306:3306
    volumes:
      - data:/var/lib/mysql

volumes:
  data: